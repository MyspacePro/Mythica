name: mythica
description: A book reading application
publish_to: "none"

version: 1.0.0+2

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # State Management
  provider: ^6.1.2
  flutter_riverpod: ^2.6.1

  # Image & Media
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  intl: ^0.20.2

  # Networking & Storage
  dio: ^5.7.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0

  # 🔥 Firebase (Updated to latest compatible generation)
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0

  # Auth Providers
  google_sign_in: ^6.3.0

  # Payments
  in_app_purchase: ^3.2.0

  # Swipe
  flutter_slidable: ^4.0.3

  # PDF Viewer (Latest - Compatible with Firebase 6+)
  syncfusion_flutter_pdfviewer: ^33.1.44

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    # Book covers and images
    - assets/books/
    - assets/banners/
    - assets/profile/
    - assets/services/
    - assets/image/
    - assets/original/
    - assets/fonts/
    
    # Individual asset files (for specific images)
    - assets/books/Book1.png
    - assets/books/Book2.png
    - assets/books/Book3.png
    - assets/books/Book4.png
    - assets/books/Book5.png
    - assets/books/Book6.png
    - assets/books/Book7.png
    
    # Banners
    - assets/banners/Banner1.jpg
    - assets/banners/Banner2.jpg
    
    # Profile images
    - assets/profile/male.png
    
    # PDFs
    - assets/original/book1.pdf
    - assets/original/book2.pdf

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700